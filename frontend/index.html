<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driving Behavior Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Driving Behavior Monitoring System</span>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar / Driver List -->
            <div class="col-md-3">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Drivers Summary</h5>
                    </div>
                    <div class="list-group list-group-flush" id="driver-list">
                        <!-- Loading placeholder -->
                        <div class="p-3 text-center">Loading drivers...</div>
                    </div>
                </div>
            </div>

            <!-- Main Dashboard Area -->
            <div class="col-md-9">
                <div class="row mb-4">
                    <div class="col-12">
                        <div class="card shadow-sm">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h5 class="mb-0">Real-time Speed Monitor: <span id="current-driver-id">-</span></h5>
                                <span class="badge bg-info text-dark" id="last-update">Last update: --:--:--</span>
                            </div>
                            <div class="card-body">
                                <canvas id="speedChart" style="width: 100%; height: 400px;"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <!-- Column 1: Historical Summary -->
                    <div class="col-md-4">
                        <div class="card shadow-sm mb-4">
                            <div class="card-header bg-secondary text-white">
                                <h5 class="mb-0">Historical Summary</h5>
                            </div>
                            <div class="card-body" id="driver-details">
                                <p class="text-muted">Select a driver from the list to see detailed statistics.</p>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Column 2: Live Behavior Metrics -->
                    <div class="col-md-4">
                        <div class="card shadow-sm mb-4">
                            <div class="card-header bg-info text-dark">
                                <h5 class="mb-0">Live Driver Behavior</h5>
                            </div>
                            <div class="card-body" id="live-behaviors">
                                <p class="text-muted">Waiting for stream...</p>
                            </div>
                        </div>
                    </div>

                    <!-- Column 3: Alerts and Violations -->
                    <div class="col-md-4">
                        <div class="card shadow-sm mb-4">
                            <div class="card-header bg-danger text-white">
                                <h5 class="mb-0">Alerts / Violations</h5>
                            </div>
                            <div class="card-body p-0">
                                <ul class="list-group list-group-flush" id="alerts-list">
                                    <li class="list-group-item">System ready.</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom Scripts -->
    <script src="js/api_service.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
